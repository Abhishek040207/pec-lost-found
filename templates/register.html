{% extends "base.html" %}
{% block title %}Register — PEC Lost & Found{% endblock %}

{% block full_page %}
<div class="auth-page">
  <div class="auth-container" style="max-width:520px;">
    <div class="auth-header">
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/>
            <line x1="22" y1="11" x2="16" y2="11"/>
          </svg>
        </div>
        <div>
          <div style="font-family:var(--font-display);font-weight:800;font-size:1.1rem;">PEC Lost &amp; Found</div>
          <div class="auth-college">Punjab Engineering College</div>
        </div>
      </div>
      <h1>Create account</h1>
      <p>Register as a PEC student to post and find items</p>
    </div>
    <div class="auth-body">
      <form method="POST" action="{{ url_for('register') }}">
        <div class="form-row">
          <div class="form-group">
            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" name="full_name" placeholder="Ravi Kumar" required>
          </div>
          <div class="form-group">
            <label for="sid">Student ID (SID)</label>
            <input type="text" id="sid" name="sid" placeholder="21CSE001" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="department">Department</label>
            <select id="department" name="department" required>
              <option value="">Select dept.</option>
              {% for dept in departments %}
              <option value="{{ dept }}">{{ dept }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label for="contact">Contact Number</label>
            <input type="tel" id="contact" name="contact" placeholder="9XXXXXXXXX" required>
          </div>
        </div>

        <div class="form-group">
          <label>Residency Status</label>
          <div class="toggle-group">
            <button type="button" class="toggle-btn active" data-hosteler="Day Scholar">Day Scholar</button>
            <button type="button" class="toggle-btn" data-hosteler="Hosteler">Hosteler</button>
          </div>
          <input type="hidden" id="hostelerStatus" name="hosteler_status" value="Day Scholar">
        </div>

        <div class="form-group" id="hostelGroup" style="display:none;">
          <label for="hostelName">Hostel Name</label>
          <input type="text" id="hostelName" name="hostel_name" placeholder="e.g. Kurukshetra, Himalaya, Shivalik…">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Min. 6 characters" required>
          </div>
          <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:4px;">Create Account</button>
      </form>
      <div class="auth-switch">
        Already registered? <a href="{{ url_for('login') }}">Sign in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
