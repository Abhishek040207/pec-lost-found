{% extends "base.html" %}
{% block title %}Reset Password — PEC Lost & Found{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Change Password</h1>
  <p>Update your account password</p>
</div>
<div class="form-card">
  <form method="POST" action="{{ url_for('reset_password') }}">
    <div class="form-group">
      <label for="current_password">Current Password</label>
      <input type="password" id="current_password" name="current_password" required>
    </div>
    <div class="form-group">
      <label for="new_password">New Password</label>
      <input type="password" id="new_password" name="new_password" required placeholder="Min. 6 characters">
    </div>
    <div class="form-group">
      <label for="confirm_password">Confirm New Password</label>
      <input type="password" id="confirm_password" name="confirm_password" required>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button type="submit" class="btn btn-primary btn-lg">Update Password</button>
      <a href="{{ url_for('profile') }}" class="btn btn-outline btn-lg">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
